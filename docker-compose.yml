# 本地开发：在本机构建并运行。 docker compose up -d --build
#
# 状态默认落在 ./state/（已在 .gitignore 里）。生产请用 docker-compose.prod.yml，
# 它要求 XLH_STATE_DIR 指向部署目录之外的绝对路径 —— 那才是「重新部署不丢数据」的关键。

services:
  # Web 界面： http://localhost:8080
  xlh-web:
    build: .
    image: ${XLH_IMAGE:-xlh:latest}
    container_name: xlh-web
    ports:
      - "${XLH_PORT:-8080}:8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ${XLH_STATE_DIR:-./state}/data:/app/data      # xlh.db：用户/授权/推送配置/历史
      - ${XLH_STATE_DIR:-./state}/cache:/app/.cache   # 净值/K线/财报/估值缓存
      - ${XLH_STATE_DIR:-./state}/output:/app/output  # 回测报告
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped
    command: ["serve", "--port", "8080"]

  # 定时推送守护：docker compose --profile push up -d
  xlh-push:
    build: .
    image: ${XLH_IMAGE:-xlh:latest}
    container_name: xlh-push
    profiles: ["push"]
    environment:
      - TZ=${TZ:-Asia/Shanghai}    # cron 按此时区解释，错了会差 8 小时
    volumes:
      - ${XLH_STATE_DIR:-./state}/data:/app/data
      - ${XLH_STATE_DIR:-./state}/cache:/app/.cache
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped
    command: ["push"]
