# 线上服务器用：只跑镜像，不在服务器上编译。
#
#   cp .env.example .env && vim .env      # 至少确认 XLH_STATE_DIR
#   docker compose -f docker-compose.prod.yml up -d
#
# ## 数据在哪
#
# 全部持久状态都在宿主机的 ${XLH_STATE_DIR}（默认 /srv/xlh-state），**在部署目录之外**。
# 部署会替换镜像与 compose 文件，但绝不触碰这个目录 —— 所以重新部署不会丢数据。
#
#   ${XLH_STATE_DIR}/data/xlh.db   ← 用户、授权码、会话、推送配置、建议历史
#                                     这是唯一不可再生的数据，务必备份（scripts/backup.sh）
#   ${XLH_STATE_DIR}/cache/        ← 净值/K线/财报/估值缓存。可再生，但全量重抓要很久
#   ${XLH_STATE_DIR}/output/       ← 回测报告 HTML。可随时丢弃

services:
  xlh-web:
    image: ${XLH_IMAGE:-xlh:latest}
    container_name: xlh-web
    # 默认只监听本机回环；对外请用 Nginx/Caddy 反代 + HTTPS + 认证。
    ports:
      - "${XLH_BIND_ADDR:-127.0.0.1}:${XLH_PORT:-8080}:8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      # 绝对路径、部署目录之外 —— 这是「重新部署不丢数据」的关键
      - ${XLH_STATE_DIR:?请在 .env 里设置 XLH_STATE_DIR（绝对路径）}/data:/app/data
      - ${XLH_STATE_DIR}/cache:/app/.cache
      - ${XLH_STATE_DIR}/output:/app/output
      # 只读挂配置：容器不该改它，改了也会被下次部署覆盖
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped
    command: ["serve", "--port", "8080"]
    healthcheck:
      # 未登录会 303 跳登录页 —— 能跳就说明进程活着、路由正常
      test: ["CMD-SHELL", "xlh --help >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 定时推送守护，按需启用：
  #   docker compose -f docker-compose.prod.yml --profile push up -d
  xlh-push:
    image: ${XLH_IMAGE:-xlh:latest}
    container_name: xlh-push
    profiles: ["push"]
    environment:
      - TZ=${TZ:-Asia/Shanghai}    # cron 按此时区解释，错了会差 8 小时
    volumes:
      # 与 web 共用同一个库：推送守护从 xlh.db 读各用户配置、写建议历史
      - ${XLH_STATE_DIR:?请在 .env 里设置 XLH_STATE_DIR（绝对路径）}/data:/app/data
      - ${XLH_STATE_DIR}/cache:/app/.cache
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped
    depends_on:
      - xlh-web
    command: ["push"]
